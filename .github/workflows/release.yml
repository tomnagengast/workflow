name: release

# Cut a release when a semver tag is pushed. One macOS host cross-compiles all
# four single-file targets, ad-hoc codesigns the darwin artifacts and runs the
# Gatekeeper launch test, packages them as `workflow_<ver>_<os>_<arch>.tar.gz`,
# publishes a GitHub Release with checksums, then renders the `workflow-cli`
# cask and pushes it to the shared Homebrew tap — matching the sibling tools
# (scout-cli, memoryd-cli, ...). See docs/release.md.
#
# Human-gated knob this workflow assumes for a fully automated run:
#   - secrets.HOMEBREW_TAP_GITHUB_TOKEN: a PAT with push access to
#     tomnagengast/homebrew-tap. Without it, publish-cask renders the cask and
#     SKIPS the push (green) so it can be pushed manually. The build + release
#     jobs need no secrets.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  # Cross-compile + sign + launch-test + package all four targets on one macOS
  # host, then collect tarballs + checksums for the release job.
  build:
    name: build + package 4 tarballs
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install deps
        run: bun install --frozen-lockfile

      - name: version matches tag
        # The released binary must print the tag's version (the build injects
        # package.json's version via --define). Assert they agree before building.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(bun -e 'console.log(require("./package.json").version)')"
          echo "tag=$tag pkg=$pkg"
          test "$tag" = "$pkg" || {
            echo "::error::tag v$tag != package.json version $pkg (bump CHANGELOG + version before tagging)"
            exit 1
          }

      - name: build + sign + package (4 tarballs + checksums)
        run: bun run release:package

      - uses: actions/upload-artifact@v4
        with:
          name: release-tarballs
          path: |
            dist/release/workflow_*.tar.gz
            dist/release/checksums.txt
            dist/release/SHA256SUMS
          if-no-files-found: error

  # Publish the GitHub Release with the four tarballs + checksums. Idempotent:
  # if the release already exists (e.g. published from a maintainer machine), the
  # assets are left untouched so their checksums keep matching the cask.
  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-tarballs
          path: dist/release
      - name: create release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — leaving assets as published"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated release. See CHANGELOG.md for details." \
              dist/release/workflow_*.tar.gz \
              dist/release/SHA256SUMS
          fi

  # Render the cask from the published assets' checksums and push it to the
  # shared tap. The only job that needs the tap PAT; without it the cask is still
  # rendered and the push is skipped (green) so it can be done by hand.
  publish-cask:
    name: render + push cask to homebrew-tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v4
        with:
          name: release-tarballs
          path: dist/release
      - name: render cask
        run: |
          bun run release:cask \
            --version "$GITHUB_REF_NAME" \
            --checksums dist/release/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --out /tmp/workflow-cli.rb
          cat /tmp/workflow-cli.rb
      - name: push to homebrew-tap (or skip without token)
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_GITHUB_TOKEN not set — cask rendered but not pushed. Copy it into tomnagengast/homebrew-tap Casks/workflow-cli.rb manually."
            exit 0
          fi
          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tomnagengast/homebrew-tap.git" "$tap_dir"
          mkdir -p "$tap_dir/Casks"
          cp /tmp/workflow-cli.rb "$tap_dir/Casks/workflow-cli.rb"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/workflow-cli.rb
          git diff --cached --quiet || git commit -m "workflow-cli ${GITHUB_REF_NAME}"
          git push origin HEAD:main
